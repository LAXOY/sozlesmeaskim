<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruşen ❤️</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e7 0%, #ffecef 50%, #fff6f9 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* YUMUŞAK ARKA PLAN KALPLERİ */
.bg-heart {
    position: absolute;
    font-size: 24px;
    opacity: 0.12;
    animation: float 12s linear infinite;
    pointer-events: none;
}

@keyframes float {
    0% {
        transform: translateY(100vh) rotate(0deg);
    }
    100% {
        transform: translateY(-120vh) rotate(360deg);
    }
}

/* ANA KART */
.card {
    width: 90%;
    max-width: 700px;
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(14px);
    border-radius: 28px;
    padding: 40px 25px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(255, 105, 180, 0.15);
    z-index: 10;
    position: relative;
}

/* BAŞLIK */
h1 {
    font-size: 38px;
    color: #ff4f87;
    margin-bottom: 20px;
    text-shadow: 0 2px 4px rgba(255, 79, 135, 0.1);
}

/* PARAGRAF */
p {
    color: #666;
    line-height: 1.8;
    font-size: 16px;
    margin-bottom: 35px;
}

/* BUTONLAR KONTEYNERI */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    position: relative;
}

button {
    padding: 14px 32px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
    outline: none;
}

#yes {
    background: linear-gradient(135deg, #ff4f87, #ff6b9d);
    color: white;
    box-shadow: 0 8px 25px rgba(255, 79, 135, 0.3);
    width: 100%;
}

#yes:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 35px rgba(255, 79, 135, 0.4);
}

#yes:active {
    transform: scale(0.98);
}

#no {
    background: white;
    color: #ff4f87;
    border: 2px solid #ff4f87;
    width: 100%;
    position: fixed;
    padding: 12px 28px;
}

#no:active {
    transform: scale(0.95);
}

/* MESAJ */
#message {
    margin-top: 20px;
    min-height: 35px;
    font-size: 18px;
    color: #ff6b9d;
    font-weight: 600;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* YAĞAN KALPLER */
.heart {
    position: fixed;
    font-size: 30px;
    animation: fall linear forwards;
    pointer-events: none;
}

@keyframes fall {
    0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .card {
        padding: 30px 20px;
    }
    
    h1 {
        font-size: 32px;
    }
    
    p {
        font-size: 15px;
    }
    
    button {
        padding: 12px 28px;
        font-size: 15px;
    }
}
</style>
</head>

<body>

<!-- ARKA PLAN KALPLERİ -->
<script>
for(let i = 0; i < 20; i++) {
    const bg = document.createElement("div");
    bg.classList.add("bg-heart");
    bg.innerHTML = ["💖","💕","💗","💞","❤️"][Math.floor(Math.random()*5)];
    bg.style.left = Math.random()*100 + "vw";
    bg.style.animationDuration = (Math.random()*10+10) + "s";
    bg.style.fontSize = (Math.random()*20+18) + "px";
    document.body.appendChild(bg);
}
</script>

<!-- ANA KART -->
<div class="card">
    <h1>📜 İlişki Sözleşmesi</h1>
    
    <p>
        Bu sözleşme 23.03.2026 tarihinden itibaren yürürlüğe girmiştir.<br><br>
        
        Taraflardan biri Ruşen'dir ❤️<br>
        Diğer taraf sonsuza kadar sevmeyi kabul eder.<br><br>
        
        <strong>Madde 1:</strong><br>
        Birbirini sebepsiz yere özlemek normaldir.<br><br>
        
        <strong>Madde 2:</strong><br>
        Sarılmalar sınırsızdır.<br><br>
        
        <strong>Madde 3:</strong><br>
        Hayır butonu gösterim amaçlıdır 😌
    </p>
    
    <div class="buttons">
        <button id="yes">EVET 💍</button>
        <button id="no">HAYIR</button>
    </div>
    
    <div id="message"></div>
</div>

<script>
/* HAYIR BUTONU - MOBİL FRIENDLY */
const noBtn = document.getElementById("no");
const message = document.getElementById("message");
const yesBtn = document.getElementById("yes");

function moveButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth - 10;
    const maxY = window.innerHeight - noBtn.offsetHeight - 10;
    
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;
    
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    
    const texts = [
        "oğlum ne diyon 😭",
        "bu seçenek çalışmıyor 😌",
        "kaçamazsın 💖",
        "yanlış buton 😭",
        "Ruşen bunu onaylamadı ❤️",
        "hayır demek yasaklandı 🚫",
        "yeniden dene 💕"
    ];
    
    message.innerHTML = texts[Math.floor(Math.random() * texts.length)];
}

/* Her tıklamaya ve touch'a kaçsın */
["click", "touchstart", "mouseover"].forEach(event => {
    noBtn.addEventListener(event, (e) => {
        e.preventDefault();
        moveButton();
    });
});

/* EVET BUTONU */
yesBtn.addEventListener("click", () => {
    // Kalp yağmuru
    for(let i = 0; i < 120; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        const emojis = ["💖", "💕", "💗", "💞", "❤️", "😍"];
        heart.innerHTML = emojis[Math.floor(Math.random() * 6)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        heart.style.fontSize = (Math.random() * 30 + 20) + "px";
        document.body.appendChild(heart);
        
        setTimeout(() => heart.remove(), 5000);
    }
    
    // Sayaç sayfasını aç
    setTimeout(() => {
        window.location.href = "love.html";
    }, 500);
});
</script>

</body>
</html>
