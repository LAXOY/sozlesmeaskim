<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Operasyon Aşkım</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#000;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#00ffcc;
}

/* ARKA PLAN EFEKTİ */

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

/* CANLI SAYAÇ */

#counter{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:#00ffcc;
    font-size:18px;
    background:rgba(0,0,0,0.65);
    padding:14px 22px;
    border:1px solid #00ffcc;
    border-radius:14px;
    box-shadow:0 0 25px #00ffcc55;
    backdrop-filter:blur(10px);
    text-align:center;
    z-index:999;
}

/* ANA PANEL */

.container{
    width:90%;
    max-width:700px;
    padding:40px;
    background:rgba(0,0,0,0.7);
    border:1px solid #00ffcc55;
    border-radius:20px;
    box-shadow:0 0 30px #00ffcc33;
    text-align:center;
    position:relative;
}

/* BAŞLIK */

h1{
    font-size:38px;
    margin-bottom:20px;
    text-shadow:0 0 10px #00ffcc;
}

/* PARAGRAF */

p{
    color:#cfcfcf;
    line-height:1.8;
    margin-bottom:40px;
    font-size:17px;
}

/* BUTONLAR */

button{
    padding:16px 38px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    transition:0.2s;
    font-weight:bold;
}

#yes{
    background:#00ff99;
    color:#000;
    box-shadow:0 0 20px #00ff9955;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#ff004c;
    color:white;
    position:absolute;
    left:55%;
    box-shadow:0 0 20px #ff004c55;
}

/* MESAJ */

#message{
    margin-top:35px;
    font-size:24px;
    color:#ff5c8a;
    min-height:40px;
}

/* KALPLER */

.heart{
    position:absolute;
    font-size:30px;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{

    0%{
        transform:translateY(-100px) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

/* GLITCH */

.glitch{
    animation:glitch 0.2s infinite;
}

@keyframes glitch{

    0%{
        transform:translate(2px,-2px);
    }

    25%{
        transform:translate(-2px,2px);
    }

    50%{
        transform:translate(2px,2px);
    }

    75%{
        transform:translate(-2px,-2px);
    }

    100%{
        transform:translate(0,0);
    }
}

</style>
</head>

<body>

<!-- CANLI SAYAÇ -->

<div id="counter"></div>

<!-- ANA PANEL -->

<div class="container">

<h1>📜 İLİŞKİ SÖZLEŞMESİ</h1>

<p>
Bu sözleşme 23.03.2026 tarihinden itibaren yürürlüğe girmiştir.<br><br>

Taraflardan biri Musti'dir.<br>
Diğer tarafın kaçış hakkı bulunmamaktadır.<br><br>

Madde 1:
Sonsuza kadar sevilecektir.<br>

Madde 2:
Tripler anlayışla karşılanacaktır.<br>

Madde 3:
Lovebombing hiç bitmeyecektir.
</p>

<button id="yes">EVET 💍</button>
<button id="no">HAYIR</button>

<div id="message"></div>

</div>

<script>

/* CANLI SAYAÇ */

const counter = document.getElementById("counter");

const startDate = new Date("2026-03-23T19:42:00");

function updateCounter(){

    const now = new Date();

    let diff = now - startDate;

    const seconds = Math.floor(diff / 1000) % 60;
    const minutes = Math.floor(diff / (1000 * 60)) % 60;
    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;

    const totalDays =
    Math.floor(diff / (1000 * 60 * 60 * 24));

    const years =
    Math.floor(totalDays / 365);

    const months =
    Math.floor((totalDays % 365) / 30);

    const days =
    (totalDays % 365) % 30;

    counter.innerHTML =
    `
    ❤️ ${years} yıl
    ${months} ay
    ${days} gün
    ${hours} saat
    ${minutes} dakika
    ${seconds} saniyedir birlikte
    `;
}

setInterval(updateCounter,1000);

updateCounter();

/* BUTONLAR */

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const message = document.getElementById("message");

/* HAYIR KAÇIŞ SİSTEMİ */

noBtn.addEventListener("mouseover", () => {

    const x =
    Math.random() * (window.innerWidth - 150);

    const y =
    Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    const texts = [

        "Oğlum ne diyon 😭",
        "Yanlış seçim tespit edildi 🚨",
        "Kaçış başarısız 💀",
        "Bu seçenek devre dışı",
        "Ruşen bunu kabul etmez 😭",
        "Sistem reddi kabul etmiyor",
        "Ben torunlarımızla gelecek bile düşündüm ne hayırı",
        "deneme güzelmiş 😭"

    ];

    message.innerText =
    texts[Math.floor(Math.random()*texts.length)];

    document.body.classList.add("glitch");

    setTimeout(() => {
        document.body.classList.remove("glitch");
    },200);

});

/* EVET */

yesBtn.addEventListener("click", () => {

    message.innerHTML =
    "başka ihtimalin zaten yoktu 💖";

    document.body.style.background = "#050505";

    /* KALP YAĞMURU */

    for(let i=0;i<120;i++){

        const heart =
        document.createElement("div");

        heart.classList.add("heart");

        const emojis = [
            "💖",
            "💘",
            "💕",
            "💞",
            "❤️",
            "😍",
            "💓"
        ];

        heart.innerHTML =
        emojis[Math.floor(Math.random()*emojis.length)];

        heart.style.left =
        Math.random()*100 + "vw";

        heart.style.animationDuration =
        (Math.random()*3+2) + "s";

        heart.style.fontSize =
        (Math.random()*25+20) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        },5000);

    }

});

</script>

</body>
</html>
